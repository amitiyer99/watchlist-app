name: Stock Price Monitor

on:
  schedule:
    # Every 10 minutes, Mon-Fri, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
    # Fires at :00, :10, :20, :30, :40, :50 of each hour 3-9 UTC
    # NOTE: the explicit '45 3' trigger was removed — it was redundant (*/10 fires at 3:40 + 3:50)
    # and was double-triggering alongside breakout-refresh.yml at 3:45
    - cron: '*/10 3-9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  check-prices:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run stock price check
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node monitor.js --once

      - name: Refresh alerts page
        continue-on-error: true
        run: node generate-alerts.js

      - name: Generate dashboard
        continue-on-error: true
        run: node generate-dashboard.js

      - name: Generate live prices for Trade Simulator
        continue-on-error: true
        run: node generate-prices.js

      - name: Commit live-prices.json to master
        # CRITICAL: must commit to master so deploy.yml never overwrites
        # gh-pages with a stale version when any code push triggers it.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          [ -f "docs/live-prices.json" ] && git add -f docs/live-prices.json || true
          git diff --staged --quiet && echo "No price changes" && exit 0
          git commit -m "data: live prices $(date -u +'%H:%M') UTC [skip ci]"
          git push origin master

      - name: Sync latest committed docs from master
        run: |
          git fetch origin
          # Pull the latest versions of pages we did NOT just regenerate
          # (daily-refresh or breakout may have updated them since our checkout)
          git checkout origin/master -- \
            docs/creamy.html docs/potential.html docs/multibagger.html \
            docs/apex.html docs/breakout.html docs/breakout2.html \
            docs/breakout2-data.json docs/nse-tickers.json docs/trades.html 2>/dev/null || true
          echo "Synced latest committed docs from master"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
