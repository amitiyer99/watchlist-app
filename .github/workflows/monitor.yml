name: Stock Price Monitor

on:
  schedule:
    # Every 10 minutes, Mon-Fri, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
    - cron: '*/10 3-9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: true

jobs:
  check-prices:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run stock price check
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node monitor.js --once

      - name: Generate live prices for Trade Simulator
        continue-on-error: true
        run: node generate-prices.js

      - name: Commit live-prices.json to master
        # This commit is the heartbeat that keeps GitHub crons alive for other workflows.
        # Without regular push activity, GitHub throttles/skips crons on inactive repos.
        # deploy.yml picks this up and pushes docs/ to gh-pages automatically.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          [ -f "docs/live-prices.json" ] && git add -f docs/live-prices.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: prices $(date -u +'%H:%M') UTC"
          git push origin master
