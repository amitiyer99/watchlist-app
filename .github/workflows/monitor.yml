name: Stock Price Monitor

on:
  schedule:
    # Every 10 minutes, Mon-Fri, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
    - cron: '*/10 3-9 * * 1-5'
    - cron: '45 3 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  check-prices:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run stock price check
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node monitor.js --once

      - name: Refresh alerts page
        continue-on-error: true
        run: node generate-alerts.js

      - name: Generate dashboard
        continue-on-error: true
        run: node generate-dashboard.js

      - name: Sync latest committed docs from master
        run: |
          git fetch origin
          # Pull the latest versions of pages we did NOT just regenerate
          # (daily-refresh or breakout may have updated them since our checkout)
          git checkout origin/master -- \
            docs/creamy.html docs/potential.html docs/multibagger.html \
            docs/apex.html docs/breakout.html docs/breakout2.html \
            docs/breakout2-data.json docs/trades.html 2>/dev/null || true
          echo "Synced latest committed docs from master"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
