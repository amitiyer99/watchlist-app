name: Breakout Scanner Refresh

on:
  schedule:
    # Every 30 minutes, Mon-Fri, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
    - cron: '15,45 3-9 * * 1-5'
    - cron: '0 4-10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: breakout-refresh
  cancel-in-progress: true

jobs:
  refresh-breakout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Generate Breakout v1
        run: node generate-breakout.js

      - name: Generate Breakout Gen2 + sidecar JSON
        run: node generate-breakout2.js

      - name: Commit and push refreshed breakout pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/breakout.html docs/breakout2.html docs/breakout2-data.json
          git diff --staged --quiet || git commit -m "data: breakout refresh $(date -u +'%Y-%m-%d %H:%M') UTC [skip ci]"
          git push
