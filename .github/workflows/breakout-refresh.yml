name: Breakout Scanner Refresh

on:
  schedule:
    # Every 30 minutes, Mon-Fri, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
    - cron: '15,45 3-9 * * 1-5'
    - cron: '0 4-10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: breakout-refresh
  cancel-in-progress: true

jobs:
  refresh-breakout:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # ── DAILY REFRESH ──────────────────────────────────────────────────────
      # Run heavy generators once per day, on the first market-open run (3:45 UTC = 9:15 AM IST).
      # This replaces the separate daily-refresh.yml schedule which GitHub kept dropping.
      # Generators run in parallel phases to minimize total wall-clock time (~2.5 min vs ~4 min):
      #   Phase 1: fast/local generators (alerts + dashboard) in parallel
      #   Phase 2: medium Tickertape generators (potential + apex) in parallel
      #   Phase 3: heavy full-screener generators (multibagger + creamy) in parallel
      - name: Daily generators (creamy, potential, multibagger, apex, alerts, dashboard)
        if: github.event.schedule == '45 3 * * 1-5' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          set -e

          echo "=== Phase 1: Fast generators (parallel) ==="
          node generate-alerts.js &
          node generate-dashboard.js &
          wait

          echo "=== Phase 2: Medium Tickertape generators (parallel) ==="
          node generate-potential.js &
          node generate-apex.js &
          wait

          echo "=== Phase 3: Heavy full-screener generators (parallel) ==="
          node generate-multibagger.js &
          node generate-creamy.js &
          wait

          echo "=== Daily generators complete ==="

      # ── BREAKOUT REFRESH ───────────────────────────────────────────────────
      - name: Generate Breakout v1
        run: node generate-breakout.js

      - name: Generate Breakout Gen2 + sidecar JSON + NSE ticker DB
        run: node generate-breakout2.js

      - name: Generate live prices for Trade Simulator
        continue-on-error: true
        run: node generate-prices.js

      - name: Commit and push all refreshed pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          for f in docs/breakout.html docs/breakout2.html docs/breakout2-data.json \
                   docs/nse-tickers.json docs/live-prices.json \
                   docs/creamy.html docs/alerts.html docs/potential.html \
                   docs/multibagger.html docs/index.html docs/apex.html; do
            [ -f "$f" ] && git add -f "$f" || true
          done
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: refresh $(date -u +'%Y-%m-%d %H:%M') UTC [skip ci]"
          git push origin master
