name: Breakout Scanner Refresh

on:
  schedule:
    # Every 30 minutes, Mon-Fri, 3:15 AM - 10:00 AM UTC (8:45 AM - 3:30 PM IST)
    - cron: '15,45 3-9 * * 1-5'
    - cron: '0 4-10 * * 1-5'
  workflow_run:
    workflows: ["Stock Price Monitor"]  # backup trigger in case crons miss
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: breakout-refresh
  cancel-in-progress: true

jobs:
  refresh-breakout:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Check if breakout was refreshed recently (25-min cooldown)
        id: check
        run: |
          # Get seconds since last commit touching breakout files
          LAST_TS=$(git log -1 --format="%ct" -- docs/breakout2.html 2>/dev/null || echo "0")
          NOW_TS=$(date +%s)
          AGE=$(( NOW_TS - LAST_TS ))
          echo "Breakout2 last committed ${AGE}s ago"
          if [ "$AGE" -lt "1500" ] && [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping — refreshed only ${AGE}s ago (cooldown 1500s)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Breakout v1
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: node generate-breakout.js

      - name: Generate Breakout Gen2 + sidecar JSON + NSE ticker DB
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: node generate-breakout2.js

      - name: Generate live prices for Trade Simulator
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: node generate-prices.js

      - name: Commit and push to master
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          for f in docs/breakout.html docs/breakout2.html docs/breakout2-data.json \
                   docs/nse-tickers.json docs/live-prices.json; do
            [ -f "$f" ] && git add -f "$f" || true
          done
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: breakout refresh $(date -u +'%H:%M') UTC"
          git push origin master
