name: Daily Creamy & Breakout Refresh

on:
  schedule:
    # 4:00 AM UTC = 9:30 AM IST, Mon-Fri (after market open, Tickertape screener is live)
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  refresh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Generate creamy layer page
        id: creamy
        continue-on-error: true
        run: node generate-creamy.js

      - name: Generate breakout scanner page
        id: breakout
        continue-on-error: true
        run: node generate-breakout.js

      - name: Generate breakout gen2 page
        id: breakout2
        continue-on-error: true
        run: node generate-breakout2.js

      - name: Generate alerts page
        id: alerts
        continue-on-error: true
        run: node generate-alerts.js

      - name: Generate potential stocks page
        id: potential
        continue-on-error: true
        run: node generate-potential.js

      - name: Report step results
        if: always()
        run: |
          echo "creamy:   ${{ steps.creamy.outcome }}"
          echo "breakout: ${{ steps.breakout.outcome }}"
          echo "breakout2:${{ steps.breakout2.outcome }}"
          echo "alerts:   ${{ steps.alerts.outcome }}"
          echo "potential:${{ steps.potential.outcome }}"

      - name: Commit and push refreshed pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/creamy.html docs/breakout.html docs/breakout2.html docs/breakout2-data.json docs/alerts.html docs/potential.html
          git diff --staged --quiet || git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
