name: Daily Refresh

on:
  schedule:
    - cron: '45 3 * * 1-5'  # 9:15 AM IST, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Phase 1 — fast generators (alerts + dashboard)
        continue-on-error: true
        run: |
          node generate-alerts.js &
          node generate-dashboard.js &
          wait

      - name: Phase 2 — medium generators (potential + apex)
        continue-on-error: true
        run: |
          node generate-potential.js &
          node generate-apex.js &
          wait

      - name: Phase 3 — heavy generators (multibagger + creamy)
        continue-on-error: true
        run: |
          node generate-multibagger.js &
          node generate-creamy.js &
          wait

      - name: Commit and push to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          for f in docs/creamy.html docs/alerts.html docs/potential.html \
                   docs/multibagger.html docs/index.html docs/apex.html; do
            [ -f "$f" ] && git add -f "$f" || true
          done
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
          git push origin master
