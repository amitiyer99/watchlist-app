name: Daily Refresh

on:
  schedule:
    - cron: '45 3 * * 1-5'  # 9:15 AM IST, Mon-Fri — primary trigger
  workflow_run:
    workflows: ["Stock Price Monitor", "Keep Alive"]  # backup: fires when either completes
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Check if daily pages already generated today
        id: check
        run: |
          # Get the last commit date of docs/index.html
          LAST=$(git log -1 --format="%ci" -- docs/index.html 2>/dev/null || echo "")
          TODAY=$(date -u +%Y-%m-%d)
          echo "Last index.html commit: $LAST  |  Today UTC: $TODAY"
          if [[ "$LAST" == "$TODAY"* ]]; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "Pages already generated today — skipping"
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "Pages are stale — will regenerate"
          fi

      - name: Phase 1 — fast generators (alerts + dashboard)
        if: steps.check.outputs.already_done == 'false'
        continue-on-error: true
        run: |
          node generate-alerts.js &
          node generate-dashboard.js &
          wait

      - name: Phase 2 — medium generators (potential + apex)
        if: steps.check.outputs.already_done == 'false'
        continue-on-error: true
        run: |
          node generate-potential.js &
          node generate-apex.js &
          wait

      - name: Phase 3 — heavy generators (multibagger + creamy + sectors)
        if: steps.check.outputs.already_done == 'false'
        continue-on-error: true
        run: |
          node generate-multibagger.js &
          node generate-creamy.js &
          node generate-sectors.js &
          wait

      - name: Commit and push to master
        if: steps.check.outputs.already_done == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          for f in docs/creamy.html docs/alerts.html docs/potential.html \
                   docs/multibagger.html docs/index.html docs/apex.html \
                   docs/sectors.html; do
            [ -f "$f" ] && git add -f "$f" || true
          done
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
          git push origin master
