name: Daily Creamy & Breakout Refresh

on:
  schedule:
    # 3:30 AM UTC = 9:00 AM IST, Mon-Fri (pre-market, Tickertape screener is live)
    - cron: '30 3 * * 1-5'
    # 4:30 AM UTC = 10:00 AM IST backup (in case 3:30 AM run fails or is skipped)
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh-pages:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Clear stale output files (non-breakout only)
        run: rm -f docs/creamy.html docs/alerts.html docs/potential.html docs/multibagger.html docs/index.html docs/apex.html

      - name: Generate creamy layer page
        id: creamy
        continue-on-error: true
        run: node generate-creamy.js

      - name: Generate alerts page
        id: alerts
        continue-on-error: true
        run: node generate-alerts.js

      - name: Generate potential stocks page
        id: potential
        continue-on-error: true
        run: node generate-potential.js

      - name: Generate multibagger page
        id: multibagger
        continue-on-error: true
        run: node generate-multibagger.js

      - name: Generate dashboard (index.html)
        id: dashboard
        continue-on-error: true
        run: node generate-dashboard.js

      - name: Generate APEX Convergence Scout
        id: apex
        continue-on-error: true
        run: node generate-apex.js

      - name: Report step results
        if: always()
        run: |
          echo "creamy:      ${{ steps.creamy.outcome }}"
          echo "alerts:      ${{ steps.alerts.outcome }}"
          echo "potential:   ${{ steps.potential.outcome }}"
          echo "multibagger: ${{ steps.multibagger.outcome }}"
          echo "dashboard:   ${{ steps.dashboard.outcome }}"
          echo "apex:        ${{ steps.apex.outcome }}"
          echo "--- files produced ---"
          ls -lh docs/*.html docs/*.json 2>/dev/null || echo "(none)"

      - name: Commit generated pages to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in docs/creamy.html docs/alerts.html docs/potential.html docs/multibagger.html docs/index.html docs/apex.html; do
            [ -f "$f" ] && git add -f "$f" || echo "Skipping missing: $f"
          done
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin master
          git push origin master
