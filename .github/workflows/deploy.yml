name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # Bot commits via GITHUB_TOKEN don't trigger push events, so we also trigger
  # via workflow_run whenever any data workflow completes on master.
  workflow_run:
    workflows:
      - "Stock Price Monitor"
      - "Breakout Scanner Refresh"
      - "Daily Refresh"
      - "Keep Alive"
    types: [completed]
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true  # cancel stale deploys; newest master is always correct

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
