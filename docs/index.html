<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>
<style>
:root{--bg:#0a0a0f;--s1:#12121a;--s2:#1a1a24;--s3:#22222e;--bd:#2a2a38;--ac:#00d4aa;--tx:#e8e8f0;--t2:#8888a0;--t3:#5a5a70;--gn:#22c55e;--rd:#ef4444;--yw:#eab308;--bl:#3b82f6;--pp:#a855f7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}
.header{background:var(--s1);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-size:1.2rem;font-weight:600;color:var(--tx)}
.header h1 span{color:var(--ac);font-weight:700}
.header-right{display:flex;align-items:center;gap:16px}
.status{font-size:.75rem;color:var(--t2);display:flex;align-items:center;gap:6px}
.status .dot{width:8px;height:8px;border-radius:50%;background:var(--yw)}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .2s}
.btn:hover{color:var(--tx);border-color:var(--ac);background:var(--s3)}
.btn.active{background:var(--ac);color:var(--bg);border-color:var(--ac);font-weight:600}
.stats-bar{display:flex;gap:12px;padding:14px 24px;background:var(--s1);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 16px;min-width:120px}
.stat-card .label{font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.stat-card .value{font-size:1.3rem;font-weight:700}
.stat-card .value.green{color:var(--gn)}
.stat-card .value.red{color:var(--rd)}
.stat-card .value.accent{color:var(--ac)}
.controls{display:flex;gap:8px;padding:14px 24px;flex-wrap:wrap;align-items:center}
.controls .label{font-size:.75rem;color:var(--t2);margin-right:4px}
.filter-group{display:flex;gap:4px;align-items:center;border:1px solid var(--bd);border-radius:8px;padding:3px;background:var(--s1)}
.filter-group .fg-label{font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding:0 6px;white-space:nowrap}
.search{padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:.85rem;font-family:inherit;width:200px;outline:none;transition:border .2s}
.search:focus{border-color:var(--ac)}
.multi-dd{position:relative;display:inline-block}
.multi-dd .dd-btn{padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:.82rem;font-family:inherit;cursor:pointer;min-width:160px;text-align:left;transition:border .2s;white-space:nowrap;display:flex;align-items:center;justify-content:space-between;gap:6px}
.multi-dd .dd-btn:hover,.multi-dd.open .dd-btn{border-color:var(--ac)}
.multi-dd .dd-btn .dd-arrow{font-size:.6rem;color:var(--t3);transition:transform .2s}
.multi-dd.open .dd-arrow{transform:rotate(180deg)}
.multi-dd .dd-panel{position:absolute;top:calc(100% + 4px);left:0;min-width:200px;max-height:260px;overflow-y:auto;background:var(--s2);border:1px solid var(--bd);border-radius:8px;z-index:200;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.multi-dd.open .dd-panel{display:block}
.dd-panel label{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:.8rem;cursor:pointer;transition:background .15s;color:var(--tx)}
.dd-panel label:hover{background:var(--s3)}
.dd-panel input[type=checkbox]{accent-color:var(--ac);width:15px;height:15px;cursor:pointer}
.dd-panel .dd-count{margin-left:auto;font-size:.68rem;color:var(--t3)}
.dd-panel .dd-actions{display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--s2);z-index:1}
.dd-panel .dd-actions button{flex:1;padding:4px 8px;border:1px solid var(--bd);border-radius:4px;background:var(--s3);color:var(--t2);cursor:pointer;font-size:.7rem;font-family:inherit;transition:all .15s}
.dd-panel .dd-actions button:hover{color:var(--tx);border-color:var(--ac)}
.table-container{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{position:sticky;top:0;z-index:10}
th{background:var(--s1);color:var(--ac);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;text-align:left;border-bottom:2px solid var(--bd);cursor:pointer;white-space:nowrap;user-select:none;transition:color .2s}
th:hover{color:var(--tx)}
th .arrow{margin-left:4px;font-size:.65rem;opacity:.5}
th.sorted .arrow{opacity:1;color:var(--ac)}
td{padding:9px 12px;border-bottom:1px solid rgba(42,42,56,.5);white-space:nowrap;transition:background .15s}
tr:hover td{background:rgba(0,212,170,.03)}
.stock-name{max-width:200px;overflow:hidden;text-overflow:ellipsis}
.stock-name a{color:var(--tx);text-decoration:none;font-weight:500;transition:color .2s}
.stock-name a:hover{color:var(--ac)}
.stock-name .ticker{color:var(--t2);font-size:.72rem;font-weight:400}
.pos{color:var(--gn)}.neg{color:var(--rd)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.tag-high{background:rgba(34,197,94,.12);color:var(--gn);border:1px solid rgba(34,197,94,.2)}
.tag-avg{background:rgba(234,179,8,.1);color:var(--yw);border:1px solid rgba(234,179,8,.2)}
.tag-low{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.tag-creamy{background:rgba(168,85,247,.15);color:var(--pp);border:1px solid rgba(168,85,247,.3);font-weight:700}
.range-bar{width:80px;height:6px;background:var(--s3);border-radius:3px;position:relative;display:inline-block;vertical-align:middle}
.range-bar .fill{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.range-pct{font-size:.75rem;margin-left:6px;font-weight:600}
.vol{color:var(--t2);font-size:.78rem}
.mcap{color:var(--t2);font-size:.78rem}
.wl-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.68rem;background:var(--s3);color:var(--t2);border:1px solid var(--bd);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.footer{text-align:center;padding:16px;color:var(--t3);font-size:.72rem;border-top:1px solid var(--bd)}

/* Mobile card view */
#cards-container{display:none;padding:0 12px 24px}
.stock-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.stock-card .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.stock-card .card-name{font-weight:600;font-size:.9rem;line-height:1.3}
.stock-card .card-name a{color:var(--tx);text-decoration:none}
.stock-card .card-ticker{color:var(--t2);font-size:.72rem}
.stock-card .card-price{text-align:right}
.stock-card .card-price .price{font-size:1.1rem;font-weight:700}
.stock-card .card-price .change{font-size:.8rem;font-weight:600}
.stock-card .card-row{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid rgba(42,42,56,.4);font-size:.78rem}
.stock-card .card-row:first-of-type{border-top:none}
.stock-card .card-label{color:var(--t2)}
.stock-card .card-val{font-weight:500}
.stock-card .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid rgba(42,42,56,.4)}
.stock-card .card-range{margin:8px 0 4px}
.stock-card .card-range .range-bar{width:100%}
.sort-select{display:none}

/* ─────── Deep Research AI ─────── */
.research-btn{background:none;border:none;cursor:pointer;padding:1px 4px;border-radius:4px;font-size:.82rem;color:var(--t3);transition:color .15s;vertical-align:middle;margin-left:2px;line-height:1;flex-shrink:0}.research-btn:hover{color:#a78bfa}
#dr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9991;overflow-y:auto;padding:20px 12px}
#dr-modal{background:var(--s2);border:1px solid var(--bd);border-radius:14px;max-width:640px;margin:20px auto;padding:22px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.dr-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.dr-title{font-size:1.1rem;font-weight:700;color:var(--tx)}.dr-subtitle{font-size:.75rem;color:var(--t2);margin-top:3px}
#dr-close{background:none;border:none;cursor:pointer;color:var(--t3);font-size:1.2rem;padding:0;line-height:1;flex-shrink:0}
.dr-section{margin-bottom:18px}.dr-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ac);font-weight:700;margin-bottom:8px}
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dr-metric{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}.dr-metric .dm-label{font-size:.65rem;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}.dr-metric .dm-val{font-size:.9rem;font-weight:600}.dr-metric .dm-sub{font-size:.65rem;color:var(--t3);margin-top:2px}
.dr-signal{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:5px;font-size:.8rem;line-height:1.4}.dr-signal.bull{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);color:var(--gn)}.dr-signal.bear{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:var(--rd)}.dr-signal.neut{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.18);color:var(--yw)}.dr-signal .ds-icon{flex-shrink:0;margin-top:1px}
.dr-ai-box{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;font-size:.82rem;line-height:1.7;color:var(--tx);min-height:80px}.dr-ai-box.loading{color:var(--t2);font-style:italic}
.dr-ai-error{color:var(--rd);font-size:.78rem;padding:6px 0}.dr-ai-key-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.dr-ai-key-input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--s3);color:var(--tx);font-size:.78rem;font-family:inherit;outline:none;transition:border .2s}.dr-ai-key-input:focus{border-color:var(--ac)}
.dr-ai-key-btn{padding:7px 14px;border:none;border-radius:6px;background:#a78bfa;color:#fff;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;white-space:nowrap}.dr-ai-key-btn:hover{background:#9061f9}
@media(max-width:768px){#dr-overlay{padding:0}#dr-modal{border-radius:0;min-height:100dvh;margin:0;max-width:100%}.dr-grid{grid-template-columns:1fr}}

@media(max-width:768px){
  .header{padding:12px 14px}
  .header h1{font-size:1rem}
  .stats-bar{padding:10px 12px;gap:8px}
  .stat-card{min-width:0;flex:1 1 calc(33.3% - 8px);padding:8px 10px}
  .stat-card .label{font-size:.6rem}
  .stat-card .value{font-size:1.05rem}
  .controls{padding:10px 12px;gap:6px}
  .controls .label{display:none}
  .filter-group{flex-wrap:wrap;width:100%}
  .filter-group .fg-label{width:100%;padding:2px 6px}
  .search{width:100%;font-size:16px}
  .multi-dd{width:100%}
  .multi-dd .dd-btn{width:100%;font-size:16px}
  .multi-dd .dd-panel{width:100%}
  .table-container{display:none}
  #cards-container{display:block}
  .sort-select{display:block;width:100%;margin-top:4px}
  .footer{font-size:.65rem;padding:12px}
}

/* ─────── Price Alert System ─────── */
.alert-btn{background:none;border:none;cursor:pointer;padding:1px 4px;border-radius:4px;font-size:.80rem;color:var(--t3);transition:color .15s;vertical-align:middle;margin-left:3px;line-height:1;flex-shrink:0}
.alert-btn:hover{color:var(--yw)}
.alert-btn.has-alert{color:var(--yw)}
.alert-btn.triggered{color:var(--rd);animation:alertPulse 1.5s ease-in-out infinite}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:.35}}
tr.alert-triggered-row td,.stock-card.alert-triggered-row{background:rgba(239,68,68,.04)!important}
.alert-bar{display:none;flex-direction:row;align-items:flex-start;gap:10px;margin:8px 28px;padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;font-size:.82rem;color:var(--rd)}
.alert-bar-body{flex:1;line-height:1.5}
.alert-bar-close{background:none;border:none;cursor:pointer;color:var(--t3);font-size:1rem;padding:0;flex-shrink:0}
html[data-theme="light"] .alert-bar{background:rgba(185,28,28,.06);border-color:rgba(185,28,28,.18);color:#991b1b}
#ap-modal{display:none;position:fixed;background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.55);width:270px}
.ap-modal-title{font-size:.85rem;font-weight:700;color:var(--tx);margin-bottom:2px;padding-right:20px;line-height:1.4}
.ap-modal-sub{font-size:.72rem;color:var(--t2);margin-bottom:10px}
#ap-x{position:absolute;top:8px;right:10px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:1.1rem;line-height:1;padding:0}
.ap-label{display:block;font-size:.72rem;color:var(--t2);margin:8px 0 3px}
#ap-above,#ap-below,#ap-pat-input{display:block;width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--s3);color:var(--tx);font-size:.84rem;font-family:inherit;outline:none;transition:border .2s;-moz-appearance:textfield;box-sizing:border-box}
#ap-above::-webkit-outer-spin-button,#ap-above::-webkit-inner-spin-button,
#ap-below::-webkit-outer-spin-button,#ap-below::-webkit-inner-spin-button{-webkit-appearance:none}
#ap-above:focus,#ap-below:focus,#ap-pat-input:focus{border-color:var(--ac)}
.ap-actions{display:flex;gap:6px;margin-top:12px}
.ap-save-btn{flex:1;padding:8px;border:none;border-radius:6px;background:var(--ac);color:#fff;cursor:pointer;font-weight:700;font-size:.8rem;font-family:inherit}
html[data-theme="light"] .ap-save-btn{color:#fff}
.ap-clear-btn{padding:8px 12px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--t2);cursor:pointer;font-size:.8rem;font-family:inherit}
.ap-clear-btn:hover{color:var(--rd);border-color:var(--rd)}
html[data-theme="light"] #ap-modal{box-shadow:0 4px 20px rgba(0,0,0,.12)}
@media(max-width:768px){.alert-bar{margin:8px 14px}#ap-modal{width:calc(100vw - 24px);left:12px!important}}
.ap-gh-section{margin-top:10px;padding-top:8px;border-top:1px solid var(--bd)}
.ap-gh-toggle{font-size:.7rem;color:var(--t3);cursor:pointer;user-select:none;padding:2px 0;display:flex;align-items:center;gap:4px}
.ap-gh-toggle:hover{color:var(--t2)}
.ap-gh-body{padding-top:6px}
.ap-gh-note{font-size:.62rem;color:var(--t3);margin-top:4px;line-height:1.4}
.ap-gh-note a{color:var(--ac);text-decoration:none}
.ap-gh-status{font-size:.7rem;margin-top:5px;padding:4px 6px;border-radius:4px;display:none}
.ap-gh-status.ok{background:rgba(34,197,94,.1);color:var(--gn);display:block}
.ap-gh-status.err{background:rgba(239,68,68,.1);color:var(--rd);display:block}
#pat-setup-bar{display:none;flex-direction:row;align-items:center;gap:8px;margin:8px 28px;padding:10px 14px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.3);border-radius:8px;font-size:.82rem;color:#93c5fd}
#pat-setup-bar input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--s3);color:var(--tx);font-size:.8rem;font-family:inherit;outline:none;min-width:0}
#pat-setup-bar input:focus{border-color:var(--ac)}
#pat-setup-bar button.connect{padding:6px 12px;border:none;border-radius:6px;background:var(--ac);color:#fff;cursor:pointer;font-size:.78rem;font-weight:700;white-space:nowrap}
#pat-setup-bar button.dismiss{background:none;border:none;cursor:pointer;color:var(--t3);font-size:1rem;padding:0;flex-shrink:0}
@media(max-width:768px){#pat-setup-bar{margin:8px 14px;flex-wrap:wrap}}

/* Alerted rows — pinned to top with amber highlight */
tr.alerted-row{background:rgba(234,179,8,.07)!important;box-shadow:inset 3px 0 0 var(--yw)}
.stock-card.alerted-row{border-left:3px solid var(--yw)!important;background:rgba(234,179,8,.05)!important}
</style>
</head>
<body>

<div class="header">
  <h1><span>Stock</span> Dashboard</h1>
  <div class="header-right">
    <a href="creamy.html" style="color:var(--t2);text-decoration:none;font-size:.8rem;padding:6px 12px;border:1px solid var(--bd);border-radius:6px;transition:all .2s" onmouseover="this.style.color='var(--ac)';this.style.borderColor='var(--ac)'" onmouseout="this.style.color='var(--t2)';this.style.borderColor='var(--bd)'">Creamy Layer</a>
    <a href="breakout.html" style="color:var(--t2);text-decoration:none;font-size:.8rem;padding:6px 12px;border:1px solid var(--bd);border-radius:6px;transition:all .2s" onmouseover="this.style.color='var(--ac)';this.style.borderColor='var(--ac)'" onmouseout="this.style.color='var(--t2)';this.style.borderColor='var(--bd)'">Breakout Scanner</a>
    <div class="status"><div class="dot"></div><span id="status-text">Snapshot</span></div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="alert-bar" class="alert-bar">
  <span style="font-size:1rem;flex-shrink:0">&#x1F514;</span>
  <div class="alert-bar-body" id="alert-bar-body"></div>
  <button class="alert-bar-close" onclick="document.getElementById('alert-bar').style.display='none'" title="Dismiss">&#x2715;</button>
</div>
<div id="pat-setup-bar">
  <span style="flex-shrink:0">&#x1F511;</span>
  <span style="flex-shrink:0;white-space:nowrap">GitHub PAT for alerts:</span>
  <input id="pat-bar-input" type="password" placeholder="ghp_... (repo Contents R+W)" autocomplete="off">
  <button class="connect" id="pat-bar-save">Connect</button>
  <button class="dismiss" id="pat-bar-close" title="Dismiss">&#x2715;</button>
</div>
<div id="ap-modal">
  <button id="ap-x">&#x2715;</button>
  <div class="ap-modal-title" id="ap-title">Set Price Alert</div>
  <div class="ap-modal-sub" id="ap-sub"></div>
  <label class="ap-label" for="ap-above">&#x1F514; Alert when price goes ABOVE &#x20B9;</label>
  <input type="number" id="ap-above" placeholder="e.g. 1500" min="0" step="0.5">
  <label class="ap-label" for="ap-below">&#x1F514; Alert when price goes BELOW &#x20B9;</label>
  <input type="number" id="ap-below" placeholder="e.g. 1200" min="0" step="0.5">
  <div class="ap-actions">
    <button class="ap-save-btn" id="ap-save">Save Alert</button>
    <button class="ap-clear-btn" id="ap-clear">Clear</button>
  </div>
  <div class="ap-gh-section">
    <div class="ap-gh-toggle" id="ap-gh-toggle">&#x2699;&#xFE0F; GitHub sync <span id="ap-gh-arrow">&#x25B8;</span></div>
    <div class="ap-gh-body" id="ap-gh-body" style="display:none">
      <label class="ap-label" for="ap-pat-input">Personal Access Token</label>
      <input type="password" id="ap-pat-input" placeholder="ghp_..." autocomplete="off">
      <button class="ap-save-btn" id="ap-pat-save" style="margin-top:8px;width:100%">Save PAT</button>
      <button class="ap-clear-btn" id="ap-import-ls" style="margin-top:6px;width:100%;font-size:.75rem">&#x1F4E5; Import alerts from this browser</button>
      <div id="ap-gh-status" class="ap-gh-status"></div>
      <p class="ap-gh-note">Create at <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a> &rarr; Fine-grained &rarr; Contents: Read+Write on this repo. Alerts save automatically to user-alerts.json on every change.</p>
    </div>
  </div>
</div>

<div id="dr-overlay">
  <div id="dr-modal">
    <div class="dr-header">
      <div>
        <div class="dr-title" id="dr-title">Deep Research</div>
        <div class="dr-subtitle" id="dr-subtitle"></div>
      </div>
      <button id="dr-close">&#x2715;</button>
    </div>
    <div id="dr-content"></div>
  </div>
</div>

<div class="controls">
  <div class="filter-group">
    <span class="fg-label">Show</span>
    <button class="btn tog-btn" data-tog="creamy">Creamy Layer</button>
    <button class="btn tog-btn" data-tog="near3m">Near 3M Low</button>
  </div>

];

function buildHead() {
  document.getElementById('table-head').innerHTML = COLS.map(c =>
    '<th style="width:'+c.w+'" data-col="'+c.key+'" class="'+(sortCol===c.key?'sorted':'')+'" onclick="doSort(\''+c.key+'\','+!!c.num+')">'+c.label+'<span class="arrow">'+(sortCol===c.key?(sortAsc?'\u25B2':'\u25BC'):'\u21C5')+'</span></th>'
  ).join('');
}

function fmt(n, d) { return n == null ? '\u2014' : Number(n).toFixed(d ?? 2); }
function fmtLakh(n) {
  if (n == null) return '\u2014';
  if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
  if (n >= 1e7) return (n/1e7).toFixed(0)+'Cr';
  if (n >= 1e5) return (n/1e5).toFixed(1)+'L';
  return n.toLocaleString('en-IN');
}
function fmtVol(n) {
  if (n == null) return '\u2014';
  if (n >= 1e7) return (n/1e7).toFixed(1)+'Cr';
  if (n >= 1e5) return (n/1e5).toFixed(1)+'L';
  if (n >= 1e3) return (n/1e3).toFixed(0)+'K';
  return n.toString();
}

function tagHtml(tag) {
  if (!tag) return '<span class="tag" style="opacity:.3">\u2014</span>';
  const cls = tag === 'High' ? 'tag-high' : tag === 'Avg' ? 'tag-avg' : 'tag-low';
  return '<span class="tag '+cls+'">'+tag+'</span>';
}

function rangeBarHtml(pct) {
  if (pct == null) return '\u2014';
  const clamped = Math.max(0, Math.min(100, pct));
  const color = pct <= 10 ? 'var(--rd)' : pct <= 30 ? 'var(--yw)' : pct <= 70 ? 'var(--ac)' : 'var(--gn)';
  const pctCls = pct <= 10 ? 'neg' : pct >= 70 ? 'pos' : '';
  return '<span class="range-bar"><span class="fill" style="width:'+clamped+'%;background:'+color+'"></span></span><span class="range-pct '+pctCls+'">'+pct.toFixed(1)+'%</span>';
}

function renderTable() {
  var _al=window._GA||{};
  // Orphan alerts: alerted tickers not in current watchlist data — show as ghost rows
  var _inWl={};allStocks.forEach(function(s){_inWl[s.ticker]=1;});
  var orphaned=Object.keys(_al).filter(function(t){return !_inWl[t];}).map(function(t){
    return {ticker:t,fullName:(_al[t].name||t),watchlist:'—',stockUrl:'',price:null,changePct:null,pctInRange:null,low3m:null,high3m:null,perfTag:null,growthTag:null,profitTag:null,valTag:null,volume:null,marketCap:null,fiftyTwoWeekLow:null,fiftyTwoWeekHigh:null};

    if (activeWls.size > 0 && !activeWls.has(s.watchlist)) return false;
    if (searchTerm) {

      if (!s.ticker.toLowerCase().includes(q) && !s.fullName.toLowerCase().includes(q)) return false;

    if (va == null) va = sortAsc ? Infinity : -Infinity;
    if (vb == null) vb = sortAsc ? Infinity : -Infinity;
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);

      + '</div>'
      + '<div class="card-row"><span class="card-label">Volume</span><span class="card-val">'+fmtVol(s.volume)+'</span></div>'
      + '<div class="card-row"><span class="card-label">Market Cap</span><span class="card-val">'+fmtLakh(s.marketCap)+'</span></div>'
      + '<div class="card-row"><span class="card-label">52W Range</span><span class="card-val">'+(s.fiftyTwoWeekLow?'\u20B9'+fmt(s.fiftyTwoWeekLow):'\u2014')+' \u2013 '+(s.fiftyTwoWeekHigh?'\u20B9'+fmt(s.fiftyTwoWeekHigh):'\u2014')+'</span></div>'
      + '<div class="card-tags">'
      +   '<span style="font-size:.65rem;color:var(--t3);width:100%;margin-bottom:2px">Perf '+tagHtml(s.perfTag)+' Growth '+tagHtml(s.growthTag)+' Profit '+tagHtml(s.profitTag)+' Val '+tagHtml(s.valTag)+'</span>'
      + '</div>'
      + '</div>';
  }).join('');
}

function renderStats() {
  const total = allStocks.length;
  const withPrice = allStocks.filter(s => s.price != null);
  const gainers = withPrice.filter(s => (s.changePct||0) > 0).length;
  const losers = withPrice.filter(s => (s.changePct||0) < 0).length;
  const creamy = allStocks.filter(s => s.perfTag === 'High').length;
  const nearBottom = allStocks.filter(s => s.pctInRange != null && s.pctInRange <= 10).length;
  const near52Low = allStocks.filter(s => s.price && s.fiftyTwoWeekLow && s.price <= s.fiftyTwoWeekLow * 1.05).length;

  document.getElementById('stats-bar').innerHTML = [
    { l: 'Total Stocks', v: total, c: 'accent' },
    { l: 'Gainers', v: gainers, c: 'green' },
    { l: 'Losers', v: losers, c: 'red' },
    { l: 'Creamy Layer', v: creamy, c: 'accent' },
    { l: 'Near 3M Low (<10%)', v: nearBottom, c: 'red' },
    { l: 'Near 52W Low', v: near52Low, c: 'red' },
  ].map(s => '<div class="stat-card"><div class="label">'+s.l+'</div><div class="value '+s.c+'">'+s.v+'</div></div>').join('');
}

// ─────── Price Alert System (GitHub-backed) ───────
(function(){
  var _GH = window._GH_ALERTS_REPO || '';
  var _GH_FILE = 'user-alerts.json';
  var _SHA = null;
  window._GA = {};

  function migrateFromLocalStorage(){
    try{
      var found={};
      // Check known key names first
      var knownKeys=['stockAlerts_v1','stockAlerts','priceAlerts','alerts','watchlistAlerts'];
      for(var ki=0;ki<knownKeys.length;ki++){
        try{ var raw=localStorage.getItem(knownKeys[ki]); if(raw){ var parsed=JSON.parse(raw); if(parsed&&typeof parsed==='object') Object.assign(found,parsed); } }catch(e){}
      }
      // Then scan all keys for alert-shaped objects
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(knownKeys.indexOf(k)>=0||k==='gh_alerts_pat')continue;
        try{
          var v=JSON.parse(localStorage.getItem(k));
          if(v&&typeof v==='object'&&!Array.isArray(v)&&Object.keys(v).length){
            var vals=Object.values(v);
            var alertLike=vals.filter(function(a){return a&&typeof a==='object'&&(a.above!=null||a.below!=null);});
            if(alertLike.length>0&&alertLike.length===vals.length){ Object.assign(found,v); }
          }
        }catch(e){}
      }
      if(Object.keys(found).length){
        window._GA=found;
        // Update visuals immediately — don't wait for async save
        refreshA();
        if(window.onAlertChange) window.onAlertChange();
        saveAlerts(found,function(ok){ ghStatus(ok?'✓ Saved '+Object.keys(found).length+' alerts to GitHub':'⚠ Highlights loaded but GitHub save failed — check PAT',ok?'ok':'err'); });
      }
    }catch(e){ console.error('[Alerts] migrate:',e); }
  }

  function pat(){ return localStorage.getItem('gh_alerts_pat')||''; }
  function setPat(v){ if(v) localStorage.setItem('gh_alerts_pat',v); else localStorage.removeItem('gh_alerts_pat'); }

  function showPatBar(msg){
    var b=document.getElementById('pat-setup-bar');
    if(!b)return;
    b.style.display='flex';
    var inp=document.getElementById('pat-bar-input');
    if(inp&&msg){ inp.placeholder=msg; }
  }
  function hidePatBar(){ var b=document.getElementById('pat-setup-bar');if(b)b.style.display='none'; }

  function ghStatus(msg,type){
    var el=document.getElementById('ap-gh-status');
    if(!el)return;
    el.textContent=msg; el.className='ap-gh-status '+(type||'');
  }

  function fetchAlerts(cb){
    var p=pat();
    if(!p){ showPatBar(); if(cb)cb(false); return; }
    fetch('https://api.github.com/repos/'+_GH+'/contents/'+_GH_FILE+'?t='+Date.now(),
      {headers:{'Authorization':'token '+p,'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){ return r.json().then(function(j){return{ok:r.ok,j:j};}); })
    .then(function(res){
      if(!res.ok) throw new Error(res.j.message||'HTTP error');
      _SHA=res.j.sha;
      try{ window._GA=JSON.parse(atob(res.j.content.replace(/\n/g,''))); }catch(e){ window._GA={}; }
      // One-time migration: if GitHub is empty, scan ALL localStorage keys for alert-shaped data
      if(!Object.keys(window._GA).length){ migrateFromLocalStorage(); }
      hidePatBar();
      refreshA();
      if(window.onAlertChange) window.onAlertChange();
      if(cb)cb(true);
    })
    .catch(function(e){
      console.error('[Alerts] fetch:',e.message);
      if(/401|403|Bad cred/i.test(e.message)){ setPat(''); showPatBar('Invalid PAT — re-enter'); }
      if(cb)cb(false);
    });
  }

  function saveAlerts(a,cb){
    var p=pat();
    if(!p){ showPatBar(); if(cb)cb(false); return; }
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(a,null,2))));
    ghStatus('Saving…','');
    function doSave(sha){
      var bodyObj={message:'chore: update price alerts [skip ci]',content:content};
      if(sha) bodyObj.sha=sha;
      return fetch('https://api.github.com/repos/'+_GH+'/contents/'+_GH_FILE,{
        method:'PUT',
        headers:{'Authorization':'token '+p,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
        body:JSON.stringify(bodyObj)
      });
    }
    // If SHA is unknown, fetch it first to avoid 422 error on existing files
    var savePromise;
    if(_SHA){
      savePromise=doSave(_SHA);
    } else {
      savePromise=fetch('https://api.github.com/repos/'+_GH+'/contents/'+_GH_FILE+'?t='+Date.now(),
        {headers:{'Authorization':'token '+p,'Accept':'application/vnd.github.v3+json'}})
        .then(function(r){return r.ok?r.json().then(function(j){_SHA=j.sha||null;return doSave(_SHA);}):doSave(null);})
        .catch(function(){return doSave(null);});
    }
    savePromise
    .then(function(r){ return r.json().then(function(j){return{ok:r.ok,j:j};}); })
    .then(function(res){
      if(!res.ok) throw new Error(res.j.message||'HTTP error');
      _SHA=res.j.content.sha;
      window._GA=a;
      refreshA();
      if(window.onAlertChange) window.onAlertChange();
      ghStatus('\u2713 Saved to GitHub','ok');
      setTimeout(function(){ghStatus('','');},3000);
      if(cb)cb(true);
    })
    .catch(function(e){
      console.error('[Alerts] save:',e.message);
      ghStatus('\u274C '+e.message,'err');
      if(cb)cb(false);
    });
  }

  var modal=document.getElementById('ap-modal');
  var curT='',curN='',curP=0;

  document.addEventListener('click',function(e){
    if(modal&&modal.style.display==='block'&&!modal.contains(e.target)&&!e.target.closest('.alert-btn')){
      modal.style.display='none';
    }
  },true);

  document.addEventListener('click',function(e){
    var btn=e.target.closest('.alert-btn');
    if(!btn)return;
    e.stopPropagation();
    curT=btn.dataset.alertTicker||'';
    curN=btn.dataset.alertName||curT;
    curP=parseFloat(btn.dataset.alertPrice)||0;
    document.getElementById('ap-title').textContent=curN+' ('+curT+')';
    document.getElementById('ap-sub').textContent='Last price: \u20B9'+curP.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
    var a=(window._GA[curT])||{};
    document.getElementById('ap-above').value=a.above||'';
    document.getElementById('ap-below').value=a.below||'';
    var r=btn.getBoundingClientRect();
    var topPos=r.bottom+6;
    if(topPos+340>window.innerHeight)topPos=Math.max(8,r.top-346);
    modal.style.top=topPos+'px';
    modal.style.left=Math.max(8,Math.min(r.left,window.innerWidth-280))+'px';
    modal.style.display='block';
    ghStatus('','');
  });

  document.getElementById('ap-x').onclick=function(){modal.style.display='none';};

  document.getElementById('ap-save').onclick=function(){
    var a=JSON.parse(JSON.stringify(window._GA));
    var above=parseFloat(document.getElementById('ap-above').value)||null;
    var below=parseFloat(document.getElementById('ap-below').value)||null;
    if(above||below){ a[curT]={above:above,below:below,name:curN}; }else{ delete a[curT]; }
    modal.style.display='none';
    saveAlerts(a);
  };
  document.getElementById('ap-clear').onclick=function(){
    var a=JSON.parse(JSON.stringify(window._GA));
    delete a[curT];
    modal.style.display='none';
    saveAlerts(a);
  };

  // GitHub PAT setup in modal
  var ghToggle=document.getElementById('ap-gh-toggle');
  if(ghToggle){
    ghToggle.onclick=function(){
      var body=document.getElementById('ap-gh-body');
      var arrow=document.getElementById('ap-gh-arrow');
      if(body.style.display==='none'){
        body.style.display='block';
        if(arrow)arrow.textContent='\u25BE';
        var pi=document.getElementById('ap-pat-input');
        if(pi){ pi.value=pat(); }
      } else {
        body.style.display='none';
        if(arrow)arrow.textContent='\u25B8';
      }
    };
  }
  var patSave=document.getElementById('ap-pat-save');
  if(patSave){
    patSave.onclick=function(){
      var v=(document.getElementById('ap-pat-input').value||'').trim();
      if(!v)return;
      setPat(v);
      ghStatus('Connecting\u2026','');
      fetchAlerts(function(ok){
        ghStatus(ok?'\u2713 Connected — alerts loaded':'\u274C Connection failed',ok?'ok':'err');
      });
    };
  }

  var importBtn=document.getElementById('ap-import-ls');
  if(importBtn){
    importBtn.onclick=function(){
      if(!pat()){ ghStatus('\u274C Save a PAT first','err'); return; }
      ghStatus('Scanning browser storage\u2026','');
      migrateFromLocalStorage();
      setTimeout(function(){
        var n=Object.keys(window._GA).length;
        if(!n) ghStatus('No alert data found in browser storage','err');
      },200);
    };
  }

  // PAT setup bar (shown when no PAT)
  var patBarSave=document.getElementById('pat-bar-save');
  if(patBarSave){
    patBarSave.onclick=function(){
      var v=(document.getElementById('pat-bar-input').value||'').trim();
      if(!v)return;
      setPat(v);
      fetchAlerts();
    };
  }
  var patBarClose=document.getElementById('pat-bar-close');
  if(patBarClose){ patBarClose.onclick=function(){hidePatBar();}; }

  function refreshA(){
    var a=window._GA;
    var triggered=[];
    document.querySelectorAll('.alert-btn').forEach(function(btn){
      var t=btn.dataset.alertTicker||'';
      var p=parseFloat(btn.dataset.alertPrice)||0;
      var n=btn.dataset.alertName||t;
      var al=a[t];
      btn.classList.remove('has-alert','triggered');
      var row=btn.closest('tr')||btn.closest('.stock-card');
      if(row)row.classList.remove('alert-triggered-row');
      if(!al||(!al.above&&!al.below)){btn.title='Set price alert';return;}
      btn.classList.add('has-alert');
      btn.title='Alert: '+(al.above?'\u25b2\u20B9'+al.above:'')+(al.above&&al.below?' / ':'')+(al.below?'\u25bc\u20B9'+al.below:'');
      var msgs=[];
      if(al.above&&p>=al.above)msgs.push('\u20B9'+p.toFixed(2)+' \u2265 target \u20B9'+al.above);
      if(al.below&&p<=al.below)msgs.push('\u20B9'+p.toFixed(2)+' \u2264 target \u20B9'+al.below);
      if(msgs.length){
        btn.classList.add('triggered');
        if(row)row.classList.add('alert-triggered-row');
        triggered.push('<strong>'+n+'</strong>: '+msgs.join(' & '));
      }
    });
    var bar=document.getElementById('alert-bar');
    var body=document.getElementById('alert-bar-body');
    if(!bar||!body)return;
    if(triggered.length){
      body.innerHTML='\uD83D\uDD14 '+triggered.length+' price alert'+(triggered.length>1?'s':'')+' triggered \u2014 '+triggered.join(' \u00B7 ');
      bar.style.display='flex';
    }else{ bar.style.display='none'; }
  }

  refreshA();
  if(window.MutationObserver){
    ['table-body','cards-container'].forEach(function(id){
      var el=document.getElementById(id);
      if(el){new MutationObserver(function(){refreshA();}).observe(el,{childList:true});}
    });
  }
  // Show PAT bar immediately on load if no token stored (don't wait for async fetch)
  if(!pat()){ showPatBar(); }
  // Fetch alerts from GitHub on load
  fetchAlerts();
})();

    var savedKey = localStorage.getItem(prov.keyName);
    if (inp) { inp.value = savedKey ? '••••••••••••' : ''; inp.placeholder = prov.keyPlaceholder; }
    if (link) { link.href = prov.keyLink; link.textContent = prov.keyLinkLabel; }
  };

  function buildDrContent(s) {
    var pos52w = (s.price && s.fiftyTwoWeekLow && s.fiftyTwoWeekHigh)
      ? ((s.price - s.fiftyTwoWeekLow) / (s.fiftyTwoWeekHigh - s.fiftyTwoWeekLow) * 100)
      : null;
    var relVol = (s.volume && s.avgVolume) ? (s.volume / s.avgVolume) : null;
    var signals = computeDrSignals(s, pos52w, relVol);
    var stance = computeDrStance(s);
    var stanceCls = stance === 'bull' ? 'pos' : stance === 'bear' ? 'neg' : '';
    var stanceLabel = stance === 'bull' ? '▲ Bullish Setup' : stance === 'bear' ? '▼ Bearish Setup' : '◆ Neutral Setup';
    var chgCls = (s.changePct||0) >= 0 ? 'pos' : 'neg';
    var chgSign = (s.changePct||0) >= 0 ? '+' : '';
    var html = '';
    html += '<div class="dr-section">'
      + '<div class="dr-section-title">📊 Price Metrics</div>'
      + '<div class="dr-grid">'
      + drMetric('Current Price', s.price ? '₹' + s.price.toFixed(2) : '—', s.changePct != null ? chgSign+s.changePct.toFixed(2)+'% today' : '', chgCls)
      + drMetric('3M Range Position', s.pctInRange != null ? s.pctInRange.toFixed(1)+'%' : '—', 'Low ₹'+(s.low3m||'—')+' · High ₹'+(s.high3m||'—'), s.pctInRange != null ? (s.pctInRange <= 15 ? 'neg' : s.pctInRange >= 70 ? 'pos' : '') : '')
      + drMetric('52W Range Position', pos52w != null ? pos52w.toFixed(1)+'%' : '—', 'Low ₹'+(s.fiftyTwoWeekLow||'—')+' · High ₹'+(s.fiftyTwoWeekHigh||'—'), pos52w != null ? (pos52w <= 10 ? 'neg' : pos52w >= 80 ? 'pos' : '') : '')
      + drMetric('Relative Volume', relVol != null ? relVol.toFixed(2)+'x' : '—', s.volume ? fmtVol(s.volume)+' vs '+fmtVol(s.avgVolume)+' avg' : '', relVol != null ? (relVol >= 2 ? 'pos' : relVol < 0.5 ? 'neg' : '') : '')
      + drMetric('Market Cap', fmtLakh(s.marketCap), '', '')
      + drMetric('Day Range', (s.dayLow && s.dayHigh) ? '₹'+s.dayLow.toFixed(0)+' – ₹'+s.dayHigh.toFixed(0) : '—', s.prevClose ? 'Prev Close ₹'+s.prevClose.toFixed(2) : '', '')
      + '</div></div>';
    html += '<div class="dr-section"><div class="dr-section-title">📈 Technical Signals</div>';
    for (var i = 0; i < signals.length; i++) {
      html += '<div class="dr-signal '+signals[i].type+'"><span class="ds-icon">'+signals[i].icon+'</span><span>'+signals[i].text+'</span></div>';
    }
    html += '</div>';
    html += '<div class="dr-section"><div class="dr-section-title">🏢 Fundamental Scorecard (Tickertape)</div>'
      + '<div class="dr-grid">'
      + drMetric('Performance', tagHtml(s.perfTag), s.perfDesc || '', '')
      + drMetric('Growth', tagHtml(s.growthTag), '', '')
      + drMetric('Profitability', tagHtml(s.profitTag), '', '')
      + drMetric('Valuation', tagHtml(s.valTag), '', '')
      + '</div>'
      + '<div style="margin-top:8px;padding:8px 12px;border-radius:8px;background:var(--s1);border:1px solid var(--bd);font-size:.78rem;color:var(--t2)">'
      + 'Overall Signal: <strong class="'+stanceCls+'" style="margin-left:6px">'+stanceLabel+'</strong>'
      + '</div></div>';
    html += '<div class="dr-section">'
      + '<div class="dr-section-title">🧠 AI Deep Analysis</div>'
      + '<div id="dr-ai-box" class="dr-ai-box loading">Select a provider &amp; paste your API key below for AI-powered analysis.</div>'
      + '<div id="dr-ai-error" class="dr-ai-error" style="display:none"></div>'
      + '<div style="margin-bottom:6px"><select id="dr-provider-select" onchange="drChangeProvider()" style="width:100%;background:var(--s1);color:var(--t1);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:.78rem;cursor:pointer">'
      + Object.keys(DR_PROVIDERS).map(function(k){return '<option value="'+k+'">'+DR_PROVIDERS[k].label+'</option>';}).join('')
      + '</select></div>'
      + '<div style="margin-bottom:6px"><select id="dr-model-select" style="width:100%;background:var(--s1);color:var(--t1);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:.78rem;cursor:pointer"></select></div>'
      + '<div class="dr-ai-key-row">'
      + '<input type="password" class="dr-ai-key-input" id="dr-key-input" placeholder="Paste API key">'
      + '<button class="dr-ai-key-btn" onclick="drRunWithKey()">Analyse ✦</button>'
      + '</div>'
      + '<div style="font-size:.62rem;color:var(--t3);margin-top:5px">Get free key at <a id="dr-key-link" href="https://console.groq.com/keys" target="_blank" rel="noopener" style="color:var(--ac)">console.groq.com</a> · Stored only in your browser</div>'
      + '</div>';
    return html;
  }

  function drMetric(label, val, sub, valCls) {
    return '<div class="dr-metric">'
      + '<div class="dm-label">'+label+'</div>'
      + '<div class="dm-val'+(valCls?' '+valCls:'')+'">'+val+'</div>'
      + (sub ? '<div class="dm-sub">'+sub+'</div>' : '')
      + '</div>';
  }

  function computeDrSignals(s, pos52w, relVol) {
    var signals = [];
    if (s.pctInRange != null) {
      if (s.pctInRange <= 10) signals.push({type:'bull', icon:'▲', text:'Near 3-month low ('+s.pctInRange.toFixed(1)+'%) — price is at near-term support; watch for a reversal or bounce.'});
      else if (s.pctInRange >= 80) signals.push({type:'bear', icon:'▼', text:'Near 3-month high ('+s.pctInRange.toFixed(1)+'%) — approaching resistance; momentum buyers may face selling pressure.'});
      else if (s.pctInRange <= 30) signals.push({type:'neut', icon:'◆', text:'Lower third of 3M range ('+s.pctInRange.toFixed(1)+'%) — below recent midpoint; cautious accumulation zone.'});
      else signals.push({type:'neut', icon:'◆', text:'Mid-range position ('+s.pctInRange.toFixed(1)+'% of 3M range) — no strong immediate technical signal.'});
    }
    if (pos52w != null) {
      if (pos52w <= 10) signals.push({type:'bull', icon:'▲', text:'Near annual low ('+pos52w.toFixed(1)+'% of 52W range) — historically attractive entry zone for patient investors.'});
      else if (pos52w >= 90) signals.push({type:'bear', icon:'▼', text:'Near annual high ('+pos52w.toFixed(1)+'% of 52W range) — strong uptrend but limited runway in near term.'});
      else if (pos52w >= 60) signals.push({type:'bull', icon:'◆', text:'Upper half of annual range ('+pos52w.toFixed(1)+'%) — maintains a bullish long-term structure.'});
      else signals.push({type:'neut', icon:'◆', text:'Lower half of annual range ('+pos52w.toFixed(1)+'%) — recovering; watch for trend confirmation.'});
    }
    if (relVol != null) {
      if (relVol >= 2) signals.push({type:'bull', icon:'▲', text:'Volume spike: '+relVol.toFixed(1)+'x average — high institutional participation validates today\'s price move.'});
      else if (relVol < 0.5) signals.push({type:'neut', icon:'◆', text:'Low volume: '+relVol.toFixed(2)+'x average — thin trading; treat price move with caution.'});
    }
    if (s.changePct != null) {
      if (s.changePct >= 5) signals.push({type:'bull', icon:'▲', text:'Strong day: +'+(s.changePct).toFixed(1)+'% — bullish momentum; monitor for follow-through sessions.'});
      else if (s.changePct <= -5) signals.push({type:'bear', icon:'▼', text:'Weak day: '+(s.changePct).toFixed(1)+'% — bearish pressure; check for support levels.'});
    }
    if (!signals.length) signals.push({type:'neut', icon:'◆', text:'Price data unavailable — no technical signals can be computed.'});
    return signals;
  }

  function computeDrStance(s) {
    var score = 0;
    if (s.perfTag === 'High') score += 2; else if (s.perfTag === 'Low') score -= 2;
    if (s.growthTag === 'High') score += 1; else if (s.growthTag === 'Low') score -= 1;
    if (s.profitTag === 'High') score += 1; else if (s.profitTag === 'Low') score -= 1;
    if (s.valTag === 'High') score += 1; else if (s.valTag === 'Low') score -= 1;
    if (s.pctInRange != null && s.pctInRange <= 15) score += 1;
    if (score >= 3) return 'bull';
    if (score <= -2) return 'bear';
    return 'neut';
  }

  function runAIAnalysis(s, apiKey, provId, model) {
    var prov = DR_PROVIDERS[provId] || DR_PROVIDERS.groq;
    if (!model) model = prov.models[0].id;
    localStorage.setItem('dr_model.'+provId, model);
    var box = document.getElementById('dr-ai-box');
    var errEl = document.getElementById('dr-ai-error');
    if (!box) return;
    box.className = 'dr-ai-box loading';
    box.textContent = '⏳ Analysing ' + s.fullName + '…';
    errEl.style.display = 'none';
    var pos52w = (s.price && s.fiftyTwoWeekLow && s.fiftyTwoWeekHigh)
      ? ((s.price - s.fiftyTwoWeekLow) / (s.fiftyTwoWeekHigh - s.fiftyTwoWeekLow) * 100).toFixed(1) + '%'
      : 'N/A';
    var relVol = (s.volume && s.avgVolume) ? (s.volume / s.avgVolume).toFixed(2) + 'x' : 'N/A';
    var chgSign = (s.changePct||0) >= 0 ? '+' : '';
    var prompt = 'You are a professional Indian stock market analyst. Analyse this NSE-listed stock and write a concise research note.\n\n'
      + 'STOCK: ' + s.fullName + ' (' + s.ticker + ') | NSE India | Watchlist: ' + s.watchlist + '\n\n'
      + 'PRICE DATA:\n'
      + '- Current: ₹' + (s.price ? s.price.toFixed(2) : 'N/A') + ' | Day Change: ' + (s.changePct != null ? chgSign+s.changePct.toFixed(2)+'%' : 'N/A') + '\n'
      + '- Day Range: ₹' + (s.dayLow ? s.dayLow.toFixed(2) : 'N/A') + ' – ₹' + (s.dayHigh ? s.dayHigh.toFixed(2) : 'N/A') + '\n'
      + '- 3-Month Range: ₹' + (s.low3m||'N/A') + ' (low) – ₹' + (s.high3m||'N/A') + ' (high) | Current position: ' + (s.pctInRange != null ? s.pctInRange.toFixed(1)+'% above 3M low' : 'N/A') + '\n'
      + '- 52-Week Range: ₹' + (s.fiftyTwoWeekLow||'N/A') + ' (low) – ₹' + (s.fiftyTwoWeekHigh||'N/A') + ' (high) | Position: ' + pos52w + ' above 52W low\n'
      + '- Volume: ' + (s.volume ? fmtVol(s.volume) : 'N/A') + ' | 3M Avg: ' + (s.avgVolume ? fmtVol(s.avgVolume) : 'N/A') + ' | Relative Volume: ' + relVol + '\n'
      + '- Market Cap: ' + fmtLakh(s.marketCap) + '\n\n'
      + 'TICKERTAPE SCORECARD (vs sector peers):\n'
      + '- Performance (price return): ' + (s.perfTag||'N/A') + ' — ' + (s.perfDesc||'') + '\n'
      + '- Growth (revenue/earnings): ' + (s.growthTag||'N/A') + '\n'
      + '- Profitability (margins/ROE): ' + (s.profitTag||'N/A') + '\n'
      + '- Valuation (P/E, P/B vs peers): ' + (s.valTag||'N/A') + '\n\n'
      + 'Write a concise research note in this EXACT format (2–3 sentences per section, use ₹ for prices):\n\n'
      + '**TECHNICAL OUTLOOK**\n'
      + 'Discuss price trend, key support/resistance from 3M and 52W data, volume signal, momentum.\n\n'
      + '**FUNDAMENTAL VIEW**\n'
      + 'Discuss business quality, growth trajectory, profitability, and valuation based on scorecard.\n\n'
      + '**ANALYST PERSPECTIVE**\n'
      + 'What a buy-side analyst would say about near-term (3–6 months) and medium-term (1–2 year) prospects.\n\n'
      + '**KEY RISKS**\n'
      + 'Top 2 company/sector-specific risks to monitor.\n\n'
      + '**KEY OPPORTUNITY**\n'
      + 'Main upside catalyst or re-rating opportunity.\n\n'
      + '**VERDICT**: [BULLISH / NEUTRAL / BEARISH] — [one clear sentence reason]';
    apiKey = String(apiKey).replace(/[^\x20-\x7E]/g, '');
    if (!apiKey) { box.className = 'dr-ai-box'; errEl.style.display = 'block'; errEl.textContent = '⚠️ API key is invalid — please clear and re-paste.'; return; }
    var fetchUrl, fetchBody, fetchHeaders = {'Content-Type': 'application/json'};
    if (provId === 'gemini') {
      fetchUrl = 'https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(model) + ':generateContent?key=' + encodeURIComponent(apiKey);
      fetchBody = JSON.stringify({contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.65, maxOutputTokens:1024}});
    } else if (provId === 'openrouter') {
      fetchUrl = 'https://openrouter.ai/api/v1/chat/completions';
      fetchHeaders['Authorization'] = 'Bearer ' + apiKey;
      fetchHeaders['HTTP-Referer'] = 'https://amitiyer99.github.io/watchlist-app/';
      fetchBody = JSON.stringify({model:model, messages:[{role:'user',content:prompt}], temperature:0.65, max_tokens:1024});
    } else {
      fetchUrl = 'https://api.groq.com/openai/v1/chat/completions';
      fetchHeaders['Authorization'] = 'Bearer ' + apiKey;
      fetchBody = JSON.stringify({model:model, messages:[{role:'user',content:prompt}], temperature:0.65, max_tokens:1024});
    }
    fetch(fetchUrl, {method:'POST', headers:fetchHeaders, body:fetchBody})
    .then(function(resp) {
      if (!resp.ok) return resp.json().then(function(e){ throw new Error((e.error && (e.error.message || JSON.stringify(e.error))) || 'API error ' + resp.status); });
      return resp.json();
    })
    .then(function(data) {
      var text = (provId === 'gemini')
        ? (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text)
        : (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content);
      if (!text) throw new Error('Empty response from AI');
      box.className = 'dr-ai-box';
      box.innerHTML = formatGeminiResponse(text);
    })
    .catch(function(err) {
      box.className = 'dr-ai-box';
      box.innerHTML = '<span style="color:var(--t2)">Could not generate AI analysis.</span>';
      errEl.style.display = 'block';
      errEl.textContent = '⚠️ ' + err.message;
    });
  }

  function formatGeminiResponse(text) {
    return text
      .replace(/\*\*([^*]+)\*\*/g, '<strong style="color:var(--ac);display:block;margin-top:12px;margin-bottom:4px">$1</strong>')
      .replace(/\n\n/g, '</p><p style="margin:4px 0">')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p style="margin:0">')
      .replace(/$/, '</p>');
  }
})();
</script>

</html>
